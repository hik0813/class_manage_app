<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나에게 맞는 복지 찾기 — 맞춤형 복지 추천</title>
  <meta name="description" content="몇 가지 질문에 답하면 나에게 맞는 복지 서비스를 찾아드립니다. 신청 방법과 공식 링크까지 한 번에." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#app">본문으로 바로가기</a>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">🤝</span>
        <div>
          <h1 class="brand-title">나에게 맞는 복지 찾기</h1>
          <p class="brand-sub">몇 가지 질문에 답하면, 받을 수 있는 복지를 알려드려요</p>
        </div>
      </div>
      <div class="a11y-bar" role="group" aria-label="화면 보기 설정">
        <button type="button" id="btn-font-down" class="a11y-btn" aria-label="글자 작게">가-</button>
        <button type="button" id="btn-font-up" class="a11y-btn" aria-label="글자 크게">가+</button>
        <button type="button" id="btn-contrast" class="a11y-btn" aria-pressed="false" aria-label="고대비 모드 켜기/끄기">고대비</button>
        <button type="button" id="btn-tts-stop" class="a11y-btn" aria-label="읽어주기 중지">🔇 중지</button>
      </div>
    </div>
  </header>

  <main id="app" class="container" aria-live="polite">
    <div class="loading-screen" id="boot-loading">
      <div class="spinner" aria-hidden="true"></div>
      <p>복지 정보를 불러오는 중입니다…</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>⚠️ 복지 제도의 금액과 기준은 매년 바뀝니다. 정확한 최신 정보는 반드시 <a href="https://www.bokjiro.go.kr" target="_blank" rel="noopener">복지로</a> 등 공식 사이트에서 확인하세요.</p>
    <p>본 서비스는 참고용 안내 도구이며, 실제 수급 자격은 관할 기관의 심사로 결정됩니다. · 문의: 보건복지상담센터 ☎129</p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
